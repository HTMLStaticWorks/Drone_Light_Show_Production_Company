<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AeroGlow Drone Light Shows</title>
  <meta name="description" content="Access your AeroGlow account to manage bookings, view shows, and customize configurations.">
  <link rel="icon" type="image/png" href="assets/images/drone_logo.png">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Custom Style Sheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 2rem 1rem;
    }
    .auth-toggles {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      z-index: 10;
    }
    html[dir="rtl"] .auth-toggles {
      left: 1.5rem;
      right: auto;
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
    }
  </style>
</head>
<body class="dark-theme">

  <!-- Top-Right Toggles (Only theme and RTL) -->
  <div class="auth-toggles">
    <button class="nav-toggle-btn rtl-toggle" id="rtlBtn" aria-label="Toggle RTL">RTL</button>
    <button class="nav-toggle-btn theme-toggle" id="themeBtn" aria-label="Toggle Theme"></button>
  </div>

  <!-- Main Content Area -->
  <main class="auth-container aurora-bg">
    <div class="auth-card glass-card text-center">
      <!-- Site Logo -->
      <a href="index.html" class="d-inline-block mb-4 text-decoration-none">
        <span class="fs-4 fw-bold text-white">
          <img src="assets/images/drone_logo.png" alt="AeroGlow Logo" class="me-2" style="max-height: 40px; border-radius: 4px;">AERO<span class="text-info">GLOW</span>
        </span>
      </a>
      
      <h2 class="h3 text-white mb-3">Welcome Back</h2>
      <p class="text-secondary mb-4 small">Enter your credentials to access your drone show control panel.</p>
      
      <!-- Login Form -->
      <form class="needs-validation-custom text-start" novalidate id="loginForm" action="index.html">
        <div class="mb-3">
          <label for="email" class="form-label text-white small">Email Address</label>
          <input type="email" class="form-control form-control-custom" id="email" required placeholder="name@company.com">
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
        
        <div class="mb-3">
          <label for="password" class="form-label text-white small">Password</label>
          <div class="input-group">
            <input type="password" class="form-control form-control-custom" id="password" required placeholder="••••••••">
            <button class="btn btn-outline-secondary border-secondary-subtle" type="button" id="passwordToggle" style="border-radius: 0 var(--border-radius-custom) var(--border-radius-custom) 0; background: rgba(255,255,255,0.05); color: #fff;">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
          <div class="invalid-feedback">Password is required.</div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-secondary small" for="rememberMe">
              Remember me
            </label>
          </div>
          <a href="#" class="text-info text-decoration-none small">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary-custom w-100 py-2.5">Sign In</button>
      </form>
      
      <!-- Divider -->
      <div class="d-flex align-items-center my-4">
        <hr class="flex-grow-1 border-secondary">
        <span class="mx-3 text-secondary small">Or login with</span>
        <hr class="flex-grow-1 border-secondary">
      </div>
      
      <!-- Social Logins -->
      <div class="d-flex gap-3 mb-4">
        <button class="btn btn-secondary-custom w-100 py-2 d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-google"></i> Google
        </button>
        <button class="btn btn-secondary-custom w-100 py-2 d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-apple"></i> Apple
        </button>
      </div>
      
      <p class="text-secondary small mb-0">
        Don't have an account? <a href="register.html" class="text-info text-decoration-none">Sign up</a>
      </p>
    </div>
  </main>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS Application Logic -->
  <script src="assets/js/main.js"></script>
  
  <script>
    // Password visibility eye-toggle
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    if (passwordToggle && passwordInput) {
      passwordToggle.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          passwordToggle.innerHTML = '<i class="bi bi-eye"></i>';
        } else {
          passwordInput.type = 'password';
          passwordToggle.innerHTML = '<i class="bi bi-eye-slash"></i>';
        }
      });
    }
  </script>
</body>
</html>
