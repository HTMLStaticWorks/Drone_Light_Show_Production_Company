<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Launch Coming Soon | AeroGlow Drone Light Shows</title>
  <meta name="description" content="AeroGlow's next mega stadium drone performance launches soon. Check the live countdown.">
  <link rel="icon" type="image/png" href="assets/images/drone_logo.png">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <!-- Custom Style Sheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="dark-theme">

  <!-- Main Content Center -->
  <main class="d-flex align-items-center min-vh-100 position-relative aurora-bg">
    <div class="container text-center py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="glass-card py-5">
            <span class="fs-4 fw-bold text-white mb-2 d-block"><img src="assets/images/drone_logo.png" alt="AeroGlow Logo" class="me-2">AERO<span class="text-info">GLOW</span></span>
            <h1 class="h2 text-white mb-4">Next Performance Launch</h1>
            <p class="text-secondary mb-5">Preparing the ground grids and RTK calibrations for our next major stadium opening ceremony show.</p>
            
            <!-- Countdown timer grid -->
            <div class="row g-3 justify-content-center mb-5">
              <div class="col-3 col-sm-2">
                <div class="bg-dark p-3 rounded border border-secondary">
                  <span class="fs-2 fw-bold text-white d-block" id="days">00</span>
                  <small class="text-secondary text-uppercase fs-8">Days</small>
                </div>
              </div>
              <div class="col-3 col-sm-2">
                <div class="bg-dark p-3 rounded border border-secondary">
                  <span class="fs-2 fw-bold text-white d-block" id="hours">00</span>
                  <small class="text-secondary text-uppercase fs-8">Hours</small>
                </div>
              </div>
              <div class="col-3 col-sm-2">
                <div class="bg-dark p-3 rounded border border-secondary">
                  <span class="fs-2 fw-bold text-white d-block" id="minutes">00</span>
                  <small class="text-secondary text-uppercase fs-8">Mins</small>
                </div>
              </div>
              <div class="col-3 col-sm-2">
                <div class="bg-dark p-3 rounded border border-secondary">
                  <span class="fs-2 fw-bold text-white d-block" id="seconds">00</span>
                  <small class="text-secondary text-uppercase fs-8">Secs</small>
                </div>
              </div>
            </div>

            <!-- Email signup -->
            <div class="row justify-content-center">
              <div class="col-md-8 col-lg-6">
                <form class="needs-validation-custom" novalidate id="soonNotifyForm">
                  <label class="form-label text-secondary mb-3"><small>Subscribe to receive coordinates and video links upon launch:</small></label>
                  <div class="input-group">
                    <input type="email" class="form-control form-control-custom" placeholder="Your Email Address" required>
                    <button class="btn btn-primary-custom" type="submit">Notify Me</button>
                  </div>
                </form>
              </div>
            </div>
            
            <div class="mt-4">
              <a href="index.html" class="text-info text-decoration-none"><i class="bi bi-arrow-left me-2"></i> Visit Main Page</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Countdown Timer script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Set target countdown date (e.g., 30 days from now)
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + 30);
      
      function updateTimer() {
        const now = new Date();
        const difference = targetDate.getTime() - now.getTime();
        
        if (difference <= 0) {
          clearInterval(timerInterval);
          return;
        }
        
        const d = Math.floor(difference / (1000 * 60 * 60 * 24));
        const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((difference % (1000 * 60)) / 1000);
        
        document.getElementById('days').innerText = String(d).padStart(2, '0');
        document.getElementById('hours').innerText = String(h).padStart(2, '0');
        document.getElementById('minutes').innerText = String(m).padStart(2, '0');
        document.getElementById('seconds').innerText = String(s).padStart(2, '0');
      }
      
      const timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    });
  </script>
</body>
</html>
